{% extends 'layout.html' %}

{%block title %}
Posts
{% endblock %}

{% block content %}
<section>
 <h1>Posts</h1>

    {% for post in posts%}
    
    <article>
        <h2>{{ post.title }}</h2>
        <p>{{ post.body }}</p>
        <time datetime="{{ post.date }}">{{ post.date }}</time>
    </article>

    {% endfor %}
</section>
{% endblock %}
