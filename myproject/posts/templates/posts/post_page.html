{% extends 'layout.html' %}

{%block title %}
{{ post.title }}
{% endblock %}

{% block content %}
<section>
    <img class="banner" src="{{post.banner.url}}" alt="Post banner"/>
        <h1>
            {{ post.title }}
        </h1>
        <p>{{ post.body }}</p>
        <time datetime="{{ post.date }}">{{ post.date }}</time>
  
</section>
{% endblock %}
